name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run desktop:build
      - uses: actions/upload-artifact@v4
        with:
          name: App-Launcher-Windows
          path: dist-desktop/App-Launcher-*.exe
          if-no-files-found: error
