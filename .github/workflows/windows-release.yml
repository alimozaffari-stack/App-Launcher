name: Build Windows installer

on:
  push:
    branches:
      - "release/direct-desktop-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Check out release source
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        shell: pwsh
        run: |
          Remove-Item package-lock.json -Force -ErrorAction SilentlyContinue
          npm install

      - name: Build Windows installer
        run: npm run desktop:build

      - name: Read app version
        id: version
        shell: pwsh
        run: '"value=$((Get-Content package.json -Raw | ConvertFrom-Json).version)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append'

      - name: Publish downloadable Windows release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: App Launcher v${{ steps.version.outputs.value }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            dist-desktop/App Launcher Setup *.exe
